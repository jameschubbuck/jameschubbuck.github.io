<body>
    <h1>jameschubbuck.com/qrcodegenerator</h1>
    <br><br>
    make a qr code! or don't, i don't care.
    <br><br>
    <button>
    <!-- TODO: disable wierd selection box, and button pressing. -->

    <input type="text" id="content" placeholder="enter content">
    </button>
    <button type="button" id="generate">generate qr code</button>
    <br><br>
    <button id="backButton">back</button>
</body>

<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2"></script>
<script>
    function generateQRCode() {
        const content = document.getElementById("content").value;
        if (content.trim() === "") {
            alert("Enter content");
            return;
        }

        const qr = new QRious({
            value: content,
        });

        const qrURL = qr.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = qrURL;
        link.download = "qrcode.png";
        link.click();
    }

    document.getElementById("generate").addEventListener("click", generateQRCode);

    document.getElementById("content").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            generateQRCode();
        }
    });
</script>
<script>
    document.getElementById('backButton').addEventListener('click', function() {
      window.history.back();
    });
</script>
